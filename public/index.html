<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#eef2f7" />
    <title>AeroQualify Pro</title>
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg"/>
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.svg"/>
    <style>body { margin: 0; background: #f0f4f8; } #root { min-height: 100vh; }</style>
  </head>
  <body>
    <noscript>Enable JavaScript to run AeroQualify Pro.</noscript>
    <div id="root"></div>
    <!-- PDF.js for rasterising attached PDFs into inline images -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      if(window.pdfjsLib){
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        // expose under the key the app checks for
        window['pdfjs-dist/build/pdf'] = window.pdfjsLib;
      }
    </script>
  </body>
</html>
